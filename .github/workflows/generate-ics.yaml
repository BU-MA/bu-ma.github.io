name: Generate ICS Calendar Feed

on:
  push:
    branches: [main]
    paths:
      - 'src/events/events.json'

jobs:
  generate-ics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate ICS file
        run: node src/misc-js/generate-ics.js

      - name: Commit updated ICS file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/events/buma-events.ics
          git diff --staged --quiet || git commit -m "Auto-regenerate ICS calendar feed"
          git push